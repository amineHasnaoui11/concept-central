{% extends "base.html" %}
{% block title %}Nouveau dossier{% endblock %}
{% block content %}
<h1>Ouvrir un dossier psychologique</h1>
<p>Élève : <strong>{{ student }}</strong></p>
{% if alert %}
<p class="alert-bridge">Lié à l'alerte #{{ alert.pk }} (score {{ alert.risk_score }})</p>
{% endif %}
<div class="card">
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-accent">Créer le dossier</button>
  </form>
</div>
{% endblock %}
